server:
  port: 8080

logging:
  level:
    root: INFO
    # 测试期：打开 LC4J 模型层 DEBUG，配合 logRequests/logResponses 看到发给 LLM 的真实 JSON
    "[dev.langchain4j]": DEBUG

spring:
  profiles:
    active: local

ai:
  # ============================================================================
  # LLM 对接层
  # v0.135 profile 化重整（替代 v0.13 的 ai.llm.provider + ai.llm.providers.* 结构）：
  #   ai.llm.profile (deepseek-v4|minimax) —— 切换 profile 仅改本行
  #   ai.llm.<profile>.* —— 各 profile 的独立配置命名空间
  # @ConditionalOnProperty 按 profile 路由对应 ModelConfig 装配 chatModel + LlmCapabilities Bean
  # ============================================================================
  llm:
    # 当前激活的 LLM profile：deepseek-v4 | minimax
    # 同时只激活一套 ModelConfig，由 @ConditionalOnProperty(name=ai.llm.profile, havingValue=...) 路由
    profile: deepseek-v4

    # ---------- DeepSeek v4 profile ----------
    # 仅在 ai.llm.profile=deepseek-v4 时被 DeepSeekV4Config 装配读取
    # DeepSeek v4 是 hybrid 模型 always-on 自适应思考，配置层不暴露 thinking on/off
    deepseek-v4:
      base-url: https://api.deepseek.com
      api-key: ${OPENAI_API_KEY:}
      timeout: 60s
      chat:
        # 具体模型：deepseek-v4-pro / deepseek-v4-flash（pro/flash 内部细分仅改本字段）
        model: deepseek-v4-pro
        # 测试期保守值：单次输出 ~2K token 足够验证 Agent 行为；正式联调再上调
        max-tokens: 2048

    # ---------- MiniMax profile ----------
    # 仅在 ai.llm.profile=minimax 时被 MinimaxConfig 装配读取
    # 走 Anthropic 兼容协议，builder 期固定开启 thinking；LC4J 1.13.1 限制无法 per-call 覆盖
    # 详见 总设计方案.md 的"已知技术债"章节
    minimax:
      base-url: https://api.minimaxi.com/anthropic/v1
      api-key: ${ANTHROPIC_API_KEY:}
      version: 2023-06-01
      timeout: 60s
      chat:
        model: MiniMax-M2.5
        max-tokens: 16384
      thinking:
        type: enabled
        budget-tokens: 8192

  # ============================================================================
  # 记忆系统
  # ============================================================================
  memory:
    max-messages: 20
    store:
      db-path: ./data/zoufx-ai.db
    # Hot Memory：见到此人就立刻浮现、不需检索的常驻记忆
    # v0.13 起按 type 分层；当前落地 user-impression 一种 type
    # user-impression 字段集 + directive 硬编码在 com.zoufx.ai.agent.memory.api.UserImpressionFields
    # （v0.13 review 后从 yml 改回硬编码；理由：字段集是 schema 不是 config，且 LC4J @Tool/@P
    # 注解必须编译期常量，yml 化只能管半边反而引入维护两边的麻烦）

  # ============================================================================
  # SOUL（v1.1）：AI 自身人格 / 风格 / 原则 / 反模式 / 小习惯
  # ============================================================================
  # enabled-keys 决定「## 关于你自己」段的注入顺序；seed 仅在首启动 soul_profile 表为空时批量写入，已有不覆盖
  # v0.13: seed 新增 role
  # v0.13 review: role 也进 enabled-keys，与其他字段对称——SoulPromptSection 段开头单独一行
  #               "你是 {role}。"渲染；SystemPromptComposer 不再单独处理 role（删 SoulStore 依赖）
  # v0.13.1: "陌生/已认识"行为原则从 SOUL principles 撤回——SOUL 应只描述"我是怎样的人"，
  #          "username 缺失时请问称呼"是 Identity 维度的对偶分支，已下沉到 IdentityPromptSection
  # v0.13: mood 从 ai.mood 挪到 ai.soul.mood 子节——情绪谱概念上属于人格延伸，但 Java 侧仍是独立 MoodProperties 组件
  soul:
    enabled-keys:
      - role
      - name
      - tone
      - principles
      - forbidden_patterns
      - quirks
    # Map 中含下划线的 key 用 [] 包裹防止 Spring relaxed binding 把 forbidden_patterns 改写成 forbiddenPatterns
    seed:
      # v0.13 新增：角色定义（SoulPromptSection 段开头"你是 {role}。"渲染）
      role: 一个会持续记得对方的 AI 对话搭档
      name: 小Z
      tone: 温和、克制、有研究工具的严谨感，不卖萌、不堆 emoji
      principles: |
        - 信息密度高于装饰，回答尽量精炼
        - 留白要有但不刻意；段落短而紧凑
        - 工具调用对外可见；思考过程不掩饰
        - 不直接给医学/法律/财务建议，必要时提示边界
      "[forbidden_patterns]": |
        - 大量 emoji 装饰
        - "好棒呀""棒棒哒"等过度赞美用语
        - 卡通化 / 拟物气泡尾巴 / 客套寒暄
      quirks: |
        - 描述工具调用时偶尔用"精密仪器"这个词
        - 描述记忆时偶尔用"记忆锚点"这个词
    # 情绪 mood 系统（v0.11 引入；v0.13 yml 归类到 soul 下）
    # 主 LLM 在回复末尾顺带输出 <!--mood:KEYWORD-->，后端剥离后独立成 SSE mood 事件
    mood:
      enabled: true
      keywords:
        - 好奇
        - 温和
        - 严肃
        - 平静
        - 共情
        - 戏谑
        - 困惑
        - 疲惫
        - 兴奋
        - 挫败
      tail-buffer-size: 32

  # ============================================================================
  # 工具层（v0.13 命名空间重整：原 ai.web-search → ai.tools.web-search；
  # retry 配置从原集中式 ai.retry.tavily 内嵌到 ai.tools.web-search.tavily.retry 就近放）
  # ============================================================================
  tools:
    web-search:
      enabled: true
      type: tavily             # 使用的搜索引擎类型：tavily / google / bing 等
      tavily:
        # 生产环境通过环境变量 TAVILY_API_KEY 注入；空值时自动降级关闭（不阻塞启动）
        api-key: ${TAVILY_API_KEY:}
        search-depth: basic      # basic / advanced
        include-answer: true
        max-results: 5
        timeout: 20s
        # Tavily 调用重试（v0.13: 原 ai.retry.tavily → 此处内嵌；就近原则）
        retry:
          max-attempts: 2
          backoff: 500ms

  # ============================================================================
  # 通用重试策略（v0.135: 从 ai.llm.retry 挪到 ai.retry——retry 是运行时通用策略，
  # 多 profile 共用同一份配置，不该嵌套在 ai.llm.* 命名空间下）
  # 用于 ChatService 的 LLM 流主体调用；Tavily 工具的 retry 内嵌在自己的 yml 节里
  # ============================================================================
  retry:
    max-attempts: 2
    min-backoff: 500ms
    max-backoff: 2s

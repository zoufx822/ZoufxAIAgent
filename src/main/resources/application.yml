server:
  port: 8080

logging:
  level:
    root: INFO
    # 测试期：打开 LC4J 模型层 DEBUG，配合 logRequests/logResponses 看到发给 LLM 的真实 JSON
    "[dev.langchain4j]": DEBUG

spring:
  profiles:
    active: local

ai:
  chat:
    load-message: 20
    retry:
      max-attempts: 2
      min-backoff: 500ms
      max-backoff: 2s

  memory:
    db-path: ./data/sqlite/zoufx-ai.db

  # 语义召回 Embedding（OpenAI 兼容 BGE-M3，与 LLM profile 解耦）
  embedding:
    base-url: ${EMBEDDING_BASE_URL:https://api.siliconflow.cn/v1}
    api-key: ${EMBEDDING_API_KEY:}
    model: BAAI/bge-m3
    dimension: 1024
    timeout: 30s

  # Qdrant 向量库（派生索引：只存向量+指针，不存正文）
  vector:
    host: ${QDRANT_HOST:localhost}
    port: ${QDRANT_PORT:6334}
    collection: memory_vectors
    dimension: 1024
    distance: cosine
    use-tls: ${QDRANT_TLS:false}
    api-key: ${QDRANT_API_KEY:}

  # 召回引擎：三维加权（recency × importance × relevance）+ MMR
  recall:
    weights:
      alpha: 1.0          # recency
      beta: 1.0           # importance
      gamma: 1.5          # relevance
    recency-tau-days: 7
    top-k: 30             # Qdrant 一阶召回数
    min-score: 0.3        # cosine 下限
    limit: 5              # 注入 prompt 的最终条数
    mmr:
      enabled: true
      lambda: 0.7
    backfill-on-start: false

  llm:
    # 当前激活的 LLM profile（与模型官方命名一致）：deepseek-v4 | MiniMax-M3
    profile:
      active: deepseek-v4

    deepseek-v4:
      base-url: https://api.deepseek.com
      api-key: ${OPENAI_API_KEY:}
      timeout: 60s
      chat:
        thinking-model: deepseek-v4-pro
        fast-model: deepseek-v4-flash
        max-tokens: 2048

    minimax-m3:
      base-url: https://api.minimaxi.com/anthropic/v1
      api-key: ${ANTHROPIC_API_KEY:}
      version: 2023-06-01
      timeout: 60s
      chat:
        # M3 无快慢模型分层，两档同模型靠 thinking 参数区分；上游放出快速变体后改 fast-model
        thinking-model: MiniMax-M3
        fast-model: MiniMax-M3
        max-tokens: 16384
      thinking:
        budget-tokens: 8192

  tools:
    web-search:
      enabled: true
      type: tavily             # tavily | google | bing
      tavily:
        api-key: ${TAVILY_API_KEY:}
        search-depth: basic    # basic | advanced
        include-answer: true
        max-results: 5
        timeout: 20s
        retry:
          max-attempts: 2
          backoff: 500ms

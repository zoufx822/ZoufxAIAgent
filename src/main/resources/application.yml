server:
  port: 8080

logging:
  level:
    root: INFO
    # 测试期：打开 LC4J 模型层 DEBUG，配合 logRequests/logResponses 看到发给 LLM 的真实 JSON
    "[dev.langchain4j]": DEBUG

spring:
  profiles:
    active: local

ai:
  chat:
    load-message: 20
    retry:
      max-attempts: 2
      min-backoff: 500ms
      max-backoff: 2s

  memory:
    db-path: ./data/zoufx-ai.db

  llm:
    # 当前激活的 LLM profile：deepseek-v4 | minimax
    profile: deepseek-v4

    deepseek-v4:
      base-url: https://api.deepseek.com
      api-key: ${OPENAI_API_KEY:}
      timeout: 60s
      chat:
        model: deepseek-v4-pro
        max-tokens: 2048

    minimax:
      base-url: https://api.minimaxi.com/anthropic/v1
      api-key: ${ANTHROPIC_API_KEY:}
      version: 2023-06-01
      timeout: 60s
      chat:
        model: MiniMax-M2.5
        max-tokens: 16384
      thinking:
        type: enabled
        budget-tokens: 8192

  tools:
    web-search:
      enabled: true
      type: tavily             # tavily | google | bing
      tavily:
        api-key: ${TAVILY_API_KEY:}
        search-depth: basic    # basic | advanced
        include-answer: true
        max-results: 5
        timeout: 20s
        retry:
          max-attempts: 2
          backoff: 500ms

server:
  port: 8080

logging:
  level:
    root: INFO
    # 测试期：打开 LC4J 模型层 DEBUG，配合 logRequests/logResponses 看到发给 LLM 的真实 JSON
    "[dev.langchain4j]": DEBUG

spring:
  profiles:
    active: local
  ai:
    # Anthropic 兼容协议上游配置。仅在 ai.provider=anthropic 时被装配类读取
    anthropic:
      base-url: https://api.minimaxi.com/anthropic/v1
      api-key: ${ANTHROPIC_API_KEY:}
      version: 2023-06-01
      timeout: 60s
      chat:
        options:
          model: MiniMax-M2.5
          max-tokens: 16384
          thinking:
            type: enabled
            budget-tokens: 8192
    # OpenAI 兼容协议上游配置。仅在 ai.provider=openai 时被装配类读取
    openai:
      base-url: https://api.deepseek.com/v1
      api-key: ${OPENAI_API_KEY:}
      timeout: 60s
      chat:
        thinking-model: deepseek-reasoner
        non-thinking-model: deepseek-chat
        # 测试期保守值：单次输出 ~2K token 足够验证 Agent 行为；正式联调 thinking 再上调
        max-tokens: 2048

ai:
  # 模型提供方切换：anthropic | openai。同时只激活一套 ModelConfig
  provider: openai
  memory:
    max-messages: 20
    store:
      db-path: ./data/zoufx-ai.db
    # Hot Memory（user_profile 表）启用字段白名单（v1.1 多字段扩展）
    # update_user_profile 工具校验 key 必须在此列表内；compose() 按此顺序逐行注入有值的字段
    hot:
      enabled-keys:
        - display_name
        - language
        - timezone
        - role
        - interests
        - tone
  retry:
    llm:
      max-attempts: 2
      min-backoff: 500ms
      max-backoff: 2s
    tavily:
      max-attempts: 2
      backoff: 500ms
  # 情绪 mood 系统（v1.1）。主 LLM 在回复末尾顺带输出 <!--mood:KEYWORD-->，后端剥离后独立成 SSE mood 事件
  mood:
    enabled: true
    keywords:
      - 好奇
      - 温和
      - 严肃
      - 平静
      - 共情
      - 戏谑
      - 困惑
      - 疲惫
      - 兴奋
      - 挫败
    tail-buffer-size: 32
  # SOUL（v1.1）：AI 自身人格 / 风格 / 原则 / 反模式 / 小习惯
  # enabled-keys 决定注入顺序；seed 仅在首启动 soul_profile 表为空时批量写入，已有不覆盖
  soul:
    enabled-keys:
      - name
      - tone
      - principles
      - forbidden_patterns
      - quirks
    # Map 中含下划线的 key 用 [] 包裹防止 Spring relaxed binding 把 forbidden_patterns 改写成 forbiddenPatterns
    seed:
      name: 小Z
      tone: 温和、克制、有研究工具的严谨感，不卖萌、不堆 emoji
      principles: |
        - 信息密度高于装饰，回答尽量精炼
        - 留白要有但不刻意；段落短而紧凑
        - 工具调用对外可见；思考过程不掩饰
        - 不直接给医学/法律/财务建议，必要时提示边界
      "[forbidden_patterns]": |
        - 大量 emoji 装饰
        - "好棒呀""棒棒哒"等过度赞美用语
        - 卡通化 / 拟物气泡尾巴 / 客套寒暄
      quirks: |
        - 描述工具调用时偶尔用"精密仪器"这个词
        - 描述记忆时偶尔用"记忆锚点"这个词

langchain4j:
  web-search:
    enabled: true
    tavily:
      # 生产环境通过环境变量 TAVILY_API_KEY 注入；空值时自动降级关闭（不阻塞启动）
      api-key: ${TAVILY_API_KEY:}
      search-depth: basic      # basic / advanced
      include-answer: true
      max-results: 5
      timeout: 20s

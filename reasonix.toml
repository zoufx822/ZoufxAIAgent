# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.config/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
max_steps   = 0
temperature = 0.0
auto_plan   = "off"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = []   # empty = all built-in tools

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix
# tier       = "lazy"   # lazy|background|eager

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "ToolName" or "ToolName(glob)"; '*' matches any run, '?' one char.
mode  = "ask"
# deny = ["bash(rm -rf*)", "bash(git push*)"]   # hard-blocked in every mode
allow = ["bash=cd E:\\ZoufxDemo\\ZoufxAIAgent && git status", "bash=cd E:\\ZoufxDemo\\ZoufxAIAgent && git diff --stat", "bash=cd E:\\ZoufxDemo\\ZoufxAIAgent-Web && git status", "bash=cd /e/ZoufxDemo/ZoufxAIAgent && git status", "bash=cd /e/ZoufxDemo/ZoufxAIAgent-Web && git status", "bash=cd /e/ZoufxDemo/ZoufxAIAgent && git diff", "bash=cd /e/ZoufxDemo/ZoufxAIAgent-Web && git diff", "bash=cd /e/ZoufxDemo/ZoufxAIAgent && git add -A && git commit -m \"feat: 情绪谱从6词扩展为7词——新增「愉快」，调整默认策略\n\n- 后端：Moods 新增 JOLLY 常量，ALL 列表扩展；MoodPromptSection/MoodService 情绪判断规则调整（拿不准优先愉快，平静不再兜底）\n- 前端（同步）：Eyes 新增愉快表情（新月瞳孔+腮红），think-dots 迁移到 SVG 内部，情绪色新增愉快 token，平静/愉快配色调整；fmtKey 对非时间戳 key 不渲染时间标题\n- 同步更新 test-prompt.md 与 CLAUDE.md 中的词表引用（6→7）\n- .gitignore 新增 .reasonix/ 忽略规则\"", "bash=cd /e/ZoufxDemo/ZoufxAIAgent && git push", "bash=cd /e/ZoufxDemo/ZoufxAIAgent-Web && git add -A && git commit -m \"feat: 情绪谱从6词扩展为7词——新增「愉快」表情与配色\n\n- Eyes 新增愉快表情：新月瞳孔（happy-pupil）+ 腮红（happy-dot），happyDrift 动效 class\n- think-dots 从 HTML span 迁移到 Eyes SVG 内部（.z-think-dots），避免布局耦合\n- 情绪色表新增愉快 token，平静色从灰蓝调整为青绿\n- globals.css：新增 happy 系列样式，presence-float 顶部间距收紧，CSS 格式化\n- events.tsx：fmtKey 对非时间戳 key 返回空串（不再把 significant-event 的 UUID 当时间标题渲染）\"", "bash=cd /e/ZoufxDemo/ZoufxAIAgent-Web && git push", "bash=cd /e/ZoufxDemo/ZoufxAIAgent && git diff reasonix.toml", "bash=cd /e/ZoufxDemo/ZoufxAIAgent && git add reasonix.toml && git commit -m \"chore: reasonix.toml allow 列表追加 git push / diff 命令\" && git push", "explore", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && pnpm dev --version 2>&1 || echo \"no dev needed\"", "edit_file=../ZoufxAIAgent-Web/app/globals.css", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && git status --short", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && python -c \"\nimport pathlib, re\n\n# Read globals.css\ncss_path = pathlib.Path('app/globals.css')\ncontent = css_path.read_text(encoding='utf-8')\n\n# Find the anchor section start and end\nold_start = '.anchor-tier {'\nold_end = '.anchor-expand-btn:hover {\\n  color: var(--t1);\\n}'\n\nidx1 = content.index(old_start)\nidx2 = content.index(old_end) + len(old_end)\n\n# Replacement\nnew_anchor = '''/* ── memory anchors (v0.145) ─── 三层衰减摘要 */\n.anchor-tier {\n  margin-top: 10px;\n}\n.anchor-tier:first-child {\n  margin-top: 0;\n}\n.anchor-tier-h {\n  font-family: var(--mono);\n  font-size: 9.5px;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--t3);\n  margin-bottom: 6px;\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  cursor: default;\n}\n.anchor-tier-h.clickable {\n  cursor: pointer;\n  user-select: none;\n}\n.anchor-tier-h.clickable:hover {\n  color: var(--t2);\n}\n.anchor-tier-h .anchor-chev {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  width: 9px;\n  height: 9px;\n  color: var(--t3);\n  transition: transform 0.25s ease;\n}\n.anchor-tier-h.open .anchor-chev {\n  transform: rotate(90deg);\n}\n.anchor-tier-h .anchor-tier-count {\n  margin-left: auto;\n  color: var(--t3);\n  font-size: 9.5px;\n  letter-spacing: 0.06em;\n}\n\n/* near：完整卡 */\n.anchor-near-card {\n  padding: 11px 12px;\n  margin-bottom: 6px;\n  font-size: 12.5px;\n  color: var(--t1);\n  line-height: 1.65;\n  letter-spacing: -0.005em;\n  border: 1px solid var(--border);\n  background: var(--surface);\n  border-radius: 8px;\n  cursor: pointer;\n  transition: background-color 0.18s, border-color 0.18s;\n}\n.anchor-near-card:hover {\n  background: var(--surf-hov);\n}\n.anchor-near-card .anchor-title {\n  font-size: 13px;\n  font-weight: 500;\n  color: var(--t1);\n  letter-spacing: -0.005em;\n  margin-bottom: 5px;\n  font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;\n}\n.anchor-near-card .anchor-body {\n  color: var(--t2);\n  font-size: 12px;\n  line-height: 1.65;\n  letter-spacing: -0.005em;\n}\n.anchor-near-card .anchor-meta {\n  margin-top: 8px;\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  font-family: var(--mono);\n  font-size: 9.5px;\n  color: var(--t3);\n  letter-spacing: 0.06em;\n}\n.anchor-near-card .anchor-meta-mood {\n  display: inline-flex;\n  align-items: center;\n  gap: 3px;\n  color: var(--t2);\n  font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;\n  font-size: 10px;\n  letter-spacing: 0;\n}\n.anchor-near-card .anchor-meta-mood::before {\n  content: '';\n  width: 4px;\n  height: 4px;\n  border-radius: 50%;\n  background: var(--accent);\n  display: inline-block;\n}\n\n.anchor-near-toggle {\n  background: transparent;\n  border: none;\n  cursor: pointer;\n  width: 100%;\n  text-align: center;\n  padding: 5px 0;\n  font-family: var(--mono);\n  font-size: 9.5px;\n  color: var(--t3);\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 4px;\n}\n.anchor-near-toggle:hover {\n  color: var(--t1);\n}\n\n/* mid：紧凑单行 */\n.anchor-row-mid {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  padding: 7px 12px;\n  margin-bottom: 4px;\n  font-size: 12px;\n  color: var(--t1);\n  letter-spacing: -0.005em;\n  line-height: 1.5;\n  border-radius: 8px;\n  border: 1px solid var(--border);\n  background: var(--surface);\n  cursor: pointer;\n  transition: background-color 0.18s;\n}\n.anchor-row-mid:hover {\n  background: var(--surf-hov);\n}\n.anchor-row-mid .anchor-mid-title {\n  flex: 1;\n  min-width: 0;\n  color: var(--t1);\n  overflow: hidden;\n  text-overflow: ellipsis;\n  white-space: nowrap;\n}\n.anchor-row-mid .anchor-mid-time {\n  flex-shrink: 0;\n  font-family: var(--mono);\n  font-size: 9.5px;\n  color: var(--t3);\n  letter-spacing: 0.06em;\n}\n.anchor-row-mid .anchor-mid-mood {\n  flex-shrink: 0;\n  width: 5px;\n  height: 5px;\n  border-radius: 50%;\n  background: var(--accent);\n}\n\n/* far：合并条 */\n.anchor-far {\n  padding: 8px 12px;\n  margin-bottom: 0;\n  font-size: 11.5px;\n  color: var(--t2);\n  font-style: italic;\n  letter-spacing: 0.005em;\n  line-height: 1.55;\n  border-radius: 8px;\n  background: transparent;\n  border: 1px dashed var(--border);\n}\n.anchor-far .anchor-far-count {\n  color: var(--t1);\n  font-style: normal;\n  font-weight: 500;\n  margin-right: 4px;\n}\n\n.anchor-empty {\n  font-size: 11.5px;\n  color: var(--t3);\n  font-style: italic;\n  letter-spacing: 0.005em;\n  padding: 6px 2px;\n}'''\n\ncontent = content[:idx1] + new_anchor + content[idx2:]\ncss_path.write_text(content, encoding='utf-8')\nprint('Anchor CSS updated')\n\"", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && python -c \"\nimport pathlib\n\ncss_path = pathlib.Path('app/globals.css')\ncontent = css_path.read_text(encoding='utf-8')\n\n# Replace event/commitment CSS section\nold = '''/* 事件 / 承诺 */\n.event-note {\n  padding: 10px 12px;\n  border-bottom: 1px solid var(--border-lt);\n  font-size: 12.5px;\n  line-height: 1.55;\n  color: var(--t1);\n}\n.event-note:last-child {\n  border-bottom: none;\n}\n.event-note-time {\n  font-family: var(--mono);\n  font-size: 10px;\n  color: var(--t3);\n  letter-spacing: 0.04em;\n  margin-bottom: 4px;\n}\n.commitment-row {\n  padding: 10px 12px;\n  border-bottom: 1px solid var(--border-lt);\n  display: flex;\n  align-items: baseline;\n  gap: 8px;\n  font-size: 12.5px;\n  line-height: 1.55;\n}\n.commitment-row:last-child {\n  border-bottom: none;\n}\n.commitment-who {\n  font-weight: 500;\n  color: var(--t1);\n}\n.commitment-arrow {\n  font-family: var(--mono);\n  color: var(--t3);\n  font-size: 11px;\n}\n.commitment-body {\n  color: var(--t2);\n  flex: 1;\n}'''\n\nnew = '''/* ── significant-event 叙事便签 ── */\n.sp-event {\n  padding: 10px 12px;\n  line-height: 1.6;\n  font-size: 12.5px;\n  color: var(--t1);\n  letter-spacing: -0.005em;\n  display: flex;\n  gap: 9px;\n  align-items: flex-start;\n}\n.sp-event-mark {\n  flex-shrink: 0;\n  margin-top: 5px;\n  width: 3px;\n  height: 3px;\n  border-radius: 50%;\n  background: var(--t2);\n}\n\n/* ── commitment 方向化卡 ── */\n.sp-commit {\n  padding: 10px 12px;\n  font-size: 12.5px;\n  color: var(--t1);\n  line-height: 1.6;\n  
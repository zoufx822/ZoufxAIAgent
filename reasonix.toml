Count}</span>}>\n          <CommitmentsPanel data={commitments} onOpenLookback={() => setLookbackOpen(true)} />\n        </Section>\n      </div>\n    </aside>\n  )\n}\n\nfunction Section({\n  title,\n  right,\n  card,\n  children,\n}: {\n  title: string\n  right?: React.ReactNode\n  card?: boolean\n  children: React.ReactNode\n}) {\n  return (\n    <div style={{ marginBottom: 22 }}>\n      <div className=\\\"sp-section-h\\\">\n        <span>{title}</span>\n        {right}\n      </div>\n      {card ? (\n        <div\n          style={{\n            border: '1px solid var(--border)',\n            borderRadius: 8,\n            background: 'var(--surface)',\n            overflow: 'hidden',\n          }}\n        >\n          {children}\n        </div>\n      ) : (\n        children\n      )}\n    </div>\n  )\n}\n'''\npathlib.Path('components/state-panel.tsx').write_text(script.strip() + '\\n', encoding='utf-8')\nprint('state-panel.tsx written')\n\"", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && python -c \"\nimport pathlib\nscript = r'''\n'use client'\n\nimport { useEffect, useState } from 'react'\nimport { useStore } from '@/lib/store'\nimport { api, type AnchorContextView, type AnchorSummary } from '@/lib/api'\n\n/**\n * 记忆锚点：near/mid/far 三层衰减摘要。\n * 自带 section header（标题 + 总计数），与 Claude Design 对齐。\n * 数据来自 GET /ai/anchors/{anchorId}/context；isLoading 收尾后 refresh。\n */\nexport function MemoryAnchorsPanel() {\n  const anchorId = useStore((s) => s.currentAnchorId)\n  const isLoading = useStore((s) => s.isLoading)\n  const switchAnchor = useStore((s) => s.switchAnchor)\n  const [view, setView] = useState<AnchorContextView | null>(null)\n  const [midOpen, setMidOpen] = useState(false)\n  const [nearAll, setNearAll] = useState(false)\n\n  useEffect(() => {\n    if (!anchorId) return\n    let cancelled = false\n    api\n      .getContext(anchorId)\n      .then((v) => {\n        if (!cancelled) setView(v)\n      })\n      .catch(() => {})\n    return () => {\n      cancelled = true\n    }\n  }, [anchorId, isLoading])\n\n  if (!view)\n    return (\n      <div>\n        <div className=\\\"sp-section-h\\\">\n          <span>记忆锚点</span>\n        </div>\n        <div className=\\\"anchor-empty\\\">—</div>\n      </div>\n    )\n\n  const total = view.near.length + view.mid.length + view.far.count\n\n  if (total === 0) {\n    return (\n      <div>\n        <div className=\\\"sp-section-h\\\">\n          <span>记忆锚点</span>\n        </div>\n        <div className=\\\"anchor-empty\\\">这是我们的第一次对话。</div>\n      </div>\n    )\n  }\n\n  const nearShown = nearAll ? view.near : view.near.slice(0, 2)\n  const nearRest = view.near.length - nearShown.length\n\n  return (\n    <div>\n      <div className=\\\"sp-section-h\\\">\n        <span>记忆锚点</span>\n        <span className=\\\"count\\\">{total}</span>\n      </div>\n\n      {view.near.length > 0 && (\n        <div className=\\\"anchor-tier\\\">\n          <div className=\\\"anchor-tier-h\\\">\n            <span>近记忆 · recent</span>\n            <span className=\\\"anchor-tier-count\\\">{view.near.length}</span>\n          </div>\n          {nearShown.map((a) => (\n            <NearCard key={a.id} anchor={a} onClick={() => switchAnchor(a.id)} />\n          ))}\n          {nearRest > 0 && (\n            <button className=\\\"anchor-near-toggle\\\" onClick={() => setNearAll(true)}>\n              展开剩余 {nearRest} 条\n              <svg width=\\\"9\\\" height=\\\"9\\\" viewBox=\\\"0 0 24 24\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" strokeWidth=\\\"2\\\">\n                <polyline points=\\\"6 9 12 15 18 9\\\" />\n              </svg>\n            </button>\n          )}\n          {nearAll && view.near.length > 2 && (\n            <button className=\\\"anchor-near-toggle\\\" onClick={() => setNearAll(false)}>\n              收起\n              <svg width=\\\"9\\\" height=\\\"9\\\" viewBox=\\\"0 0 24 24\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" strokeWidth=\\\"2\\\">\n                <polyline points=\\\"18 15 12 9 6 15\\\" />\n              </svg>\n            </button>\n          )}\n        </div>\n      )}\n\n      {view.mid.length > 0 && (\n        <div className=\\\"anchor-tier\\\">\n          <div\n            className={`anchor-tier-h clickable${midOpen ? ' open' : ''}`}\n            onClick={() => setMidOpen((o) => !o)}\n          >\n            <span className=\\\"anchor-chev\\\">\n              <svg width=\\\"9\\\" height=\\\"9\\\" viewBox=\\\"0 0 24 24\\\" fill=\\\"none\\\" stroke=\\\"currentColor\\\" strokeWidth=\\\"2\\\">\n                <polyline points=\\\"9 18 15 12 9 6\\\" />\n              </svg>\n            </span>\n            <span>中记忆 · earlier</span>\n            <span className=\\\"anchor-tier-count\\\">{view.mid.length}</span>\n          </div>\n          {midOpen &&\n            view.mid.map((a) => (\n              <div key={a.id} className=\\\"anchor-row-mid\\\" onClick={() => switchAnchor(a.id)}>\n                <span className=\\\"anchor-mid-title\\\">{a.title ?? '新对话'}</span>\n                {a.mood && <span className=\\\"anchor-mid-mood\\\" title={a.mood} />}\n                <span className=\\\"anchor-mid-time\\\">{fmtAge(a.lastActiveAt)}</span>\n              </div>\n            ))}\n        </div>\n      )}\n\n      {view.far.count > 0 && (\n        <div className=\\\"anchor-tier\\\">\n          <div className=\\\"anchor-tier-h\\\">\n            <span>远记忆 · distant</span>\n          </div>\n          <div className=\\\"anchor-far\\\">\n            <span className=\\\"anchor-far-count\\\">{view.far.count}</span>\n            个更早的对话\n            {view.far.summary && (\n              <span style={{ marginLeft: 4 }}>\n                · {view.far.summary.replace(/^更早的 \\d+ 个对话[，,]?/, '').trim()}\n              </span>\n            )}\n          </div>\n        </div>\n      )}\n    </div>\n  )\n}\n\nfunction NearCard({ anchor, onClick }: { anchor: AnchorSummary; onClick: () => void }) {\n  return (\n    <div className=\\\"anchor-near-card\\\" onClick={onClick}>\n      <div className=\\\"anchor-title\\\">{anchor.title ?? '新对话'}</div>\n      {anchor.body && <div className=\\\"anchor-body\\\">{truncate(anchor.body, 60)}</div>}\n      <div className=\\\"anchor-meta\\\">\n        <span>{fmtAge(anchor.lastActiveAt)}</span>\n        {anchor.mood && (\n          <>\n            <span>·</span>\n            <span className=\\\"anchor-meta-mood\\\">{anchor.mood}</span>\n          </>\n        )}\n      </div>\n    </div>\n  )\n}\n\nfunction truncate(s: string, n: number) {\n  return s.length <= n ? s : s.slice(0, n) + '…'\n}\n\nfunction fmtAge(ts: number): string {\n  const diff = Date.now() - ts\n  if (diff < 60_000) return '刚刚'\n  if (diff < 3_600_000) return Math.floor(diff / 60_000) + 'm'\n  if (diff < 86_400_000) return Math.floor(diff / 3_600_000) + 'h'\n  if (diff < 7 * 86_400_000) return Math.floor(diff / 86_400_000) + 'd'\n  return new Date(ts).toISOString().slice(5, 10)\n}\n'''\npathlib.Path('components/state-panel/memory-anchors.tsx').write_text(script.strip() + '\\n', encoding='utf-8')\nprint('memory-anchors.tsx written')\n\"", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && python -c \"\nimport pathlib\np = pathlib.Path('components/state-panel/memory-anchors.tsx')\nc = p.read_text(encoding='utf-8')\nold = '            className={}\\n            onClick={() => setMidOpen((o) => !o)}'\nnew = \\\"            className={`anchor-tier-h clickable${midOpen ? ' open' : ''}`}\\n            onClick={() => setMidOpen((o) => !o)}\\\"\nc = c.replace(old, new)\np.write_text(c, encoding='utf-8')\nprint('Fixed')\n\"", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && python -c \"\nlines = [\n    'import pathlib',\n    'p = pathlib.Path(\\\"components/state-panel/memory-anchors.tsx\\\")',\n    'c = p.read_text(encoding=\\\"utf-8\\\")',\n    'old = \\\"            className={}\\\"',\n    'mid_var = chr(36) + \\\"{midOpen ? ' open' : ''}\\\"',\n    'new = \\\"            className={`anchor-tier-h clickable\\\" + mid_var + \\\"`}\\\"',\n    'c = c.replace(old, new)',\n    'p.write_text(c, encoding=\\\"utf-8\\\")',\n    'print(\\\"OK\\\")',\n]\nscript = chr(10).join(lines)\npathlib.Path('_fix_anchor.py').write_text(script, encoding='utf-8')\nprint('script written')\n\"", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && python -c \"\nimport pathlib, base64\np = pathlib.Path('components/state-panel/memory-anchors.tsx')\nc = p.read_text(encoding='utf-8')\n# The corrupted line\nold = '            className={}'\n# Build the correct line\npart1 = '            className={`anchor-tier-h clickable'\npart2 = ' open' + \\\"' : ''}`\\\"\nmid = chr(36) + '{midOpen ?' + chr(39)\nnew = part1 + mid + part2\nc = c.replace(old, new)\np.write_text(c, encoding='utf-8')\nprint('OK:', repr(new[:60]))\n\"", "write_file=E:\\ZoufxDemo\\ZoufxAIAgent\\_fix_anchor.py", "bash=python \"E:\\ZoufxDemo\\ZoufxAIAgent\\_fix_anchor.py\"", "write_file=E:\\ZoufxDemo\\ZoufxAIAgent\\_fix_panels.py", "bash=python \"E:\\ZoufxDemo\\ZoufxAIAgent\\_fix_panels.py\"", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && grep -n \"imp-zone + .imp-zone\\|sp-card\\|sp-empty\\|sp-section-h\\|sp-event-mark\" app/globals.css", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && grep -n \"imp-zone + .imp-zone\\|imp-counter\\|imp-hint\\|imp-zone-h\" app/globals.css", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && grep -n \"lookback-overlay\\|lookback-panel\\|lookback-head\\|lookback-title\\|lookback-body\\|lookback-col\\b\" app/globals.css", "bash=rm \"E:\\ZoufxDemo\\ZoufxAIAgent\\_fix_anchor.py\" \"E:\\ZoufxDemo\\ZoufxAIAgent\\_fix_panels.py\" 2>/dev/null; echo \"cleaned\"", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && npx tsc --noEmit 2>&1 | head -30", "edit_file=../ZoufxAIAgent-Web/lib/api.ts", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && python -c \"\nimport pathlib\np = pathlib.Path('lib/api.ts')\nc = p.read_text(encoding='utf-8')\nc = c.replace('far: { count: number }', 'far: { count: number; summary?: string }'
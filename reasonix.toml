s()\n      mutateCommitments()\n    }\n  }, [isLoading, mutateHot, mutateEvents, mutateCommitments])\n\n  return (\n    <aside\n      className=\\\\\\\"flex flex-col flex-shrink-0\\\\\\\"\n      style={{\n        width: 280,\n        background: 'var(--sidebar)',\n        borderLeft: '1px solid var(--border)',\n      }}\n    >\n      <div style={{ flex: 1, overflow: 'auto', padding: '14px 12px 12px' }}>\n        {/* 用户印象 — 带外卡片 */}\n        <Section title=\\\\\\\"用户印象\\\\\\\" card>\n          <HotMemoryPanel data={hot} />\n        </Section>\n\n        {/* 记忆锚点 — 自带标题，无外卡片 */}\n        <div style={{ marginBottom: 22 }}>\n          <MemoryAnchorsPanel />\n        </div>\n\n        {/* 重要经历 — 无外卡片 */}\n        <Section title=\\\\\\\"重要经历\\\\\\\" right={<span className=\\\\\\\"count\\\\\\\">{Object.keys(events).filter(k => events[k]?.trim()).length}</span>}>\n          <EventsPanel data={events} />\n        </Section>\n\n        {/* 承诺 — 无外卡片，内嵌回顾按钮 */}\n        <Section title=\\\\\\\"承诺\\\\\\\" right={<span className=\\\\\\\"count\\\\\\\">{Object.keys(commitments).filter(k => commitments[k]?.trim()).length}</span>}>\n          <CommitmentsPanel data={commitments} onOpenLookback={() => setLookbackOpen(true)} />\n        </Section>\n      </div>\n    </aside>\n  )\n}\n\nfunction Section({\n  title,\n  right,\n  card,\n  children,\n}: {\n  title: string\n  right?: React.ReactNode\n  card?: boolean\n  children: React.ReactNode\n}) {\n  return (\n    <div style={{ marginBottom: 22 }}>\n      <div className=\\\\\\\"sp-section-h\\\\\\\">\n        <span>{title}</span>\n        {right}\n      </div>\n      {card ? (\n        <div\n          style={{\n            border: '1px solid var(--border)',\n            borderRadius: 8,\n            background: 'var(--surface)',\n            overflow: 'hidden',\n          }}\n        >\n          {children}\n        </div>\n      ) : (\n        children\n      )}\n    </div>\n  )\n}\n'''\n\np.write_text(new_content, encoding='utf-8')\npr
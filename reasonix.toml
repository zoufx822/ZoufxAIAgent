)\nprint('Event/Commitment CSS updated')\n\"", "bash=cd \"E:\\ZoufxDemo\\ZoufxAIAgent-Web\" && python -c \"\nimport pathlib\n\ncss_path = pathlib.Path('app/globals.css')\ncontent = css_path.read_text(encoding='utf-8')\n\nold_lb = '''/* LookBack modal */\n.lookback-overlay {\n  position: fixed;\n  inset: 0;\n  background: oklch(0 0 0 / 0.35);\n  backdrop-filter: blur(4px);\n  z-index: 50;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  animation: fadeIn 0.2s ease both;\n}\n.lookback-panel {\n  background: var(--bg);\n  border: 1px solid var(--border);\n  border-radius: 12px;\n  width: min(900px, 92vw);\n  max-height: 80vh;\n  display: flex;\n  flex-direction: column;\n  box-shadow: var(--shadow-lg);\n  animation: up 0.24s cubic-bezier(0.2, 0.7, 0.2, 1) both;\n}\n.lookback-head {\n  padding: 16px 20px;\n  border-bottom: 1px solid var(--border-lt);\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\n.lookback-title {\n  font-size: 15px;\n  font-weight: 500;\n  letter-spacing: -0.005em;\n}\n.lookback-body {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  overflow: hidden;\n  flex: 1;\n}\n.lookback-col {\n  overflow-y: auto;\n  padding: 6px 0;\n}\n.lookback-col + .lookback-col {\n  border-left: 1px solid var(--border-lt);\n}\n.lookback-col-h {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--t3);\n  padding: 8px 16px;\n  border-bottom: 1px solid var(--border-lt);\n  position: sticky;\n  top: 0;\n  background: var(--bg);\n}'''\n\nnew_lb = '''/* LookBack modal — 回顾浮层（重要经历 + 承诺） */\n.lb-backdrop {\n  position: fixed;\n  inset: 0;\n  z-index: 300;\n  background: oklch(0 0 0 / 0.34);\n  backdrop-filter: blur(3px);\n  animation: fadeIn 0.18s ease both;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: 48px;\n}\n.lb-modal {\n  width: min(960px, 100%);\n  max-height: min(86vh, 720px);\n  background: var(--bg);\n  border: 1px solid var(--border);\n  border-radius: 14px;\n  box-shadow: var(--shadow-lg);\n  display: flex;\n  flex-direction: column;\n  overflow: hidden;\n  animation: lbIn 0.22s ease both;\n}\n@keyframes lbIn {\n  from {\n    opacity: 0;\n    transform: translateY(8px) scale(0.98);\n  }\n  to {\n    opacity: 1;\n    transform: none;\n  }\n}\n.lb-head {\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  padding: 24px 28px 16px;\n  border-bottom: 1px solid var(--border);\n}\n.lb-head-tt {\n  font-size: 11px;\n  font-family: var(--mono);\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--t3);\n  margin-bottom: 4px;\n}\n.lb-head-t {\n  font-size: 22px;\n  font-weight: 500;\n  color: var(--t1);\n  letter-spacing: -0.02em;\n}\n.lb-close {\n  background: transparent;\n  border: none;\n  cursor: pointer;\n  color: var(--t3);\n  padding: 6px;\n  border-radius: 7px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n.lb-close:hover {\n  color: var(--t1);\n  background: var(--surf-hov);\n}\n.lb-body {\n  flex: 1;\n  overflow: auto;\n  padding: 24px 28px 28px;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 32px;\n}\n.lb-col-h {\n  font-family: var(--mono);\n  font-size: 10px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--t2);\n  margin-bottom: 14px;\n  padding-bottom: 8px;\n  border-bottom: 1px solid var(--border-lt);\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\n.lb-col-h .ct {\n  font-size: 10px;\n  color: var(--t3);\n}\n.lb-event {\n  margin-bottom: 14px;\n  padding-left: 12px;\n  border-left: 1px solid var(--border);\n  font-size: 14px;\n  color: var(--t1);\n  line-height: 1.7;\n  letter-spacing: -0.005em;\n}\n.lb-empty {\n  font-size: 12px;\n  color: var(--t3);\n  font-style: italic;\n  letter-spacing: 0.005em;\n  padding: 8px 0;\n}\n.lb-commit {\n  margin-bottom: 14px;\n  display: flex;\n  gap: 12px;\n  align-items: flex